<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Locoselli HACCP V8</title>
  <link rel="icon" href="logo.PNG">
  <link rel="apple-touch-icon" href="logo-apple.png">
  <style>
    :root{
      --bg:#111318; --card:#1b1e25; --card2:#232733; --line:#343949; --text:#f3efe7; --muted:#b4ac9d; --gold:#c9a45c;
      --ok:#1f8b4d; --bad:#b43c3c;
    }
    *{box-sizing:border-box}
    body{margin:0;background:linear-gradient(180deg,#0d0f13,#171a21);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;padding:14px}
    .app{max-width:1100px;margin:0 auto}
    .hero,.panel{background:var(--card);border:1px solid var(--line);border-radius:18px}
    .hero{padding:16px}
    .top{display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap;align-items:center}
    .brand{display:flex;gap:12px;align-items:center}
    .logo{width:56px;height:56px;border-radius:14px;overflow:hidden;background:#111;border:1px solid rgba(201,164,92,.28);display:flex;align-items:center;justify-content:center}
    .logo img{width:100%;height:100%;object-fit:cover}
    h1{margin:0;color:#e7ca8c;font-size:28px}
    .muted{color:var(--muted)}
    .toolbar{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px;margin-top:14px}
    .tile{background:var(--card2);border:1px solid var(--line);border-radius:14px;padding:10px}
    .tile h3{margin:0 0 8px 0;font-size:13px;color:var(--muted)}
    input,select,button,textarea{font:inherit}
    input,select,textarea{width:100%;padding:10px 11px;border-radius:12px;border:1px solid var(--line);background:#171a21;color:var(--text)}
    button{padding:10px 14px;border-radius:12px;border:1px solid var(--line);background:var(--card2);color:var(--text);cursor:pointer}
    .gold{background:linear-gradient(180deg,#d3b06a,#af8944);color:#111;border:none;font-weight:700}
    .layout{display:grid;grid-template-columns:280px 1fr;gap:14px;margin-top:14px}
    .side,.main{background:var(--card);border:1px solid var(--line);border-radius:18px}
    .side{padding:10px}
    .navbtn{display:block;width:100%;text-align:left;padding:12px;border-radius:12px;border:1px solid transparent;background:transparent;color:var(--text)}
    .navbtn.active{background:var(--card2);border-color:rgba(201,164,92,.25);color:#e7ca8c}
    .navbtn+.navbtn{margin-top:8px}
    .main{padding:14px}
    .section{display:none}
    .section.active{display:block}
    .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .panel{padding:12px}
    .row{display:grid;grid-template-columns:1fr 110px 120px;gap:10px;align-items:center;margin:10px 0}
    .chip{display:inline-block;padding:6px 10px;border-radius:999px;border:1px solid var(--line);font-size:12px}
    .ok{background:rgba(31,139,77,.16);border-color:rgba(31,139,77,.35);color:#9ae3b6}
    .bad{background:rgba(180,60,60,.16);border-color:rgba(180,60,60,.35);color:#ffb8b8}
    .checkgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .checkitem{display:flex;justify-content:space-between;gap:10px;align-items:center;padding:11px;border-radius:12px;background:var(--card2);border:1px solid var(--line)}
    .checkitem input{width:auto}
    table{width:100%;border-collapse:collapse}
    th,td{padding:10px;border-bottom:1px solid var(--line);text-align:left;font-size:14px}
    .tablewrap{overflow:auto;border:1px solid var(--line);border-radius:12px;background:var(--card2)}
    .status{margin-top:12px;padding:10px 12px;border-radius:12px;background:#14171d;border:1px solid var(--line);color:#e7ca8c}
    .actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}
    textarea{min-height:110px}
    @media (max-width:900px){
      .toolbar,.layout,.grid2,.checkgrid{grid-template-columns:1fr}
      .row{grid-template-columns:1fr 110px 120px}
    }
  </style>
</head>
<body>
<div class="app">
  <div class="hero">
    <div class="top">
      <div class="brand">
        <div class="logo"><img src="logo.PNG" alt="Locoselli" onerror="this.style.display='none'; this.parentNode.textContent='L';"></div>
        <div>
          <h1>Locoselli HACCP</h1>
          <div class="muted">V8 semplificata e stabile</div>
        </div>
      </div>
      <div class="actions">
        <button type="button" id="exportBtn">Esporta backup</button>
        <button type="button" id="importBtn">Importa backup</button>
        <input type="file" id="importFile" accept=".json" hidden>
        <button type="button" class="gold" onclick="window.print()">Stampa / PDF</button>
      </div>
    </div>

    <div class="toolbar">
      <div class="tile">
        <h3>Oggi</h3>
        <div id="todayLabel"></div>
      </div>
      <div class="tile">
        <h3>Data controllo</h3>
        <input type="date" id="dateInput">
      </div>
      <div class="tile">
        <h3>Ora controllo</h3>
        <input type="time" id="timeInput">
      </div>
      <div class="tile">
        <h3>Turno</h3>
        <select id="shiftInput">
          <option value="morning">Mattina</option>
          <option value="evening">Sera</option>
        </select>
      </div>
    </div>

    <div class="status" id="statusBox">Pronto.</div>
  </div>

  <div class="layout">
    <div class="side">
      <button type="button" class="navbtn active" data-target="temperature">🌡️ Temperature</button>
      <button type="button" class="navbtn" data-target="cleaning">🧼 Pulizie</button>
      <button type="button" class="navbtn" data-target="equipment">⚙️ Attrezzature</button>
      <button type="button" class="navbtn" data-target="notes">📝 Note</button>
      <button type="button" class="navbtn" data-target="history">📚 Storico</button>
    </div>

    <div class="main">
      <section id="temperature" class="section active">
        <div class="grid2">
          <div class="panel">
            <h3>Cucina</h3>
            <div id="tempsKitchen"></div>
          </div>
          <div class="panel">
            <h3>Sala / Bar</h3>
            <div id="tempsRoom"></div>
          </div>
        </div>
      </section>

      <section id="cleaning" class="section">
        <div class="panel">
          <h3>Pulizie</h3>
          <div id="cleaningGrid" class="checkgrid"></div>
        </div>
      </section>

      <section id="equipment" class="section">
        <div class="panel">
          <h3>Attrezzature</h3>
          <div id="equipmentGrid" class="checkgrid"></div>
        </div>
      </section>

      <section id="notes" class="section">
        <div class="panel">
          <h3>Note</h3>
          <textarea id="notesInput" placeholder="Note, problemi, azioni correttive..."></textarea>
        </div>
      </section>

      <section id="history" class="section">
        <div class="panel">
          <h3>Storico</h3>
          <div class="tablewrap">
            <table>
              <thead>
                <tr>
                  <th>Data</th>
                  <th>Turno</th>
                  <th>Ora</th>
                  <th>Temp OK</th>
                  <th>Pulizie</th>
                  <th>Azione</th>
                </tr>
              </thead>
              <tbody id="historyBody"></tbody>
            </table>
          </div>
        </div>
      </section>

      <div class="actions">
        <button type="button" class="gold" id="saveBtn">Salva turno</button>
        <button type="button" id="resetBtn">Azzera turno</button>
      </div>
    </div>
  </div>
</div>

<script>
(function(){
  const STORAGE_KEY = "locoselli_haccp_v8";

  const tempKitchen = [
    {key:"cellaVerdure", label:"Frigo cella verdure", min:0, max:4},
    {key:"lineaPrimi", label:"Frigo linea primi", min:0, max:4},
    {key:"lineaSecondi", label:"Frigo linea secondi", min:0, max:4},
    {key:"frigoAntipasti", label:"Frigo antipasti", min:0, max:4},
    {key:"congelatoreCucina", label:"Congelatore cucina", max:-18, freezer:true},
    {key:"abbattitore", label:"Abbattitore", max:-18, freezer:true}
  ];
  const tempRoom = [
    {key:"frigoViniRossi", label:"Frigo vini rossi", min:12, max:18},
    {key:"frigoViniBianchi", label:"Frigo vini bianchi", min:4, max:8},
    {key:"congelatoreSala", label:"Congelatore sala", max:-18, freezer:true},
    {key:"frigoBevande", label:"Frigo bevande", min:0, max:4},
    {key:"cellaSottoBevande", label:"Cella sotto bevande", min:0, max:4}
  ];
  const cleaningItems = ["Bagno sopra","Bagno sotto","Bagno personale","Pavimenti","Finestre","Scaffali","Tavoli","Superfici lavoro","Celle e frigo"];
  const equipmentItems = ["Bollitore","Cuocipasta","Griglia","Cappa","Forno ventilato","Thermomix 1","Thermomix 2","Planetaria","Macchina caffè","Scaffali fuori"];

  function emptySlot(){
    const temps = {};
    [...tempKitchen, ...tempRoom].forEach(t => temps[t.key] = "");
    const cleaning = {};
    cleaningItems.forEach(i => cleaning[i] = false);
    const equipment = {};
    equipmentItems.forEach(i => equipment[i] = {clean:false, ok:false});
    return {time:"", temps, cleaning, equipment, notes:""};
  }

  function defaultState(){
    const now = new Date();
    return {
      selectedDate: now.toISOString().slice(0,10),
      selectedTime: now.toTimeString().slice(0,5),
      selectedShift: "morning",
      records: {}
    };
  }

  function loadState(){
    try{
      const raw = localStorage.getItem(STORAGE_KEY);
      if(!raw) return defaultState();
      return Object.assign(defaultState(), JSON.parse(raw));
    }catch(e){
      return defaultState();
    }
  }

  let state = loadState();

  function saveState(msg){
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    if(msg) setStatus(msg);
  }

  function setStatus(msg){
    document.getElementById("statusBox").textContent = msg;
  }

  function ensureDate(date){
    if(!state.records[date]){
      state.records[date] = {morning: emptySlot(), evening: emptySlot()};
    }
    if(!state.records[date].morning) state.records[date].morning = emptySlot();
    if(!state.records[date].evening) state.records[date].evening = emptySlot();
    return state.records[date];
  }

  function currentSlot(){
    return ensureDate(state.selectedDate)[state.selectedShift];
  }

  function classify(item, value){
    if(value === "" || isNaN(Number(value))) return {text:"—", cls:""};
    const v = Number(value);
    if(item.freezer) return v <= item.max ? {text:"OK", cls:"ok"} : {text:"Fuori range", cls:"bad"};
    return (v >= item.min && v <= item.max) ? {text:"OK", cls:"ok"} : {text:"Fuori range", cls:"bad"};
  }

  function countTempOk(slot){
    return [...tempKitchen, ...tempRoom].filter(item => classify(item, slot.temps[item.key]).cls === "ok").length;
  }

  function countCleaning(slot){
    return Object.values(slot.cleaning).filter(Boolean).length;
  }

  function buildTemperatureRows(items, targetId){
    const box = document.getElementById(targetId);
    box.innerHTML = "";
    const slot = currentSlot();

    items.forEach(item => {
      const wrap = document.createElement("div");
      wrap.className = "row";

      const label = document.createElement("label");
      label.textContent = item.label;

      const input = document.createElement("input");
      input.type = "number";
      input.step = "0.1";
      input.value = slot.temps[item.key] || "";
      input.placeholder = "°C";

      const chip = document.createElement("span");
      chip.className = "chip";

      function refreshChip(){
        const res = classify(item, input.value);
        chip.textContent = res.text;
        chip.className = "chip " + (res.cls || "");
      }

      input.addEventListener("input", () => {
        slot.temps[item.key] = input.value;
        saveState("Temperatura aggiornata · " + state.selectedDate + " · " + (state.selectedShift === "morning" ? "Mattina" : "Sera"));
        refreshChip();
        renderHistory();
      });

      refreshChip();

      wrap.appendChild(label);
      wrap.appendChild(input);
      wrap.appendChild(chip);
      box.appendChild(wrap);
    });
  }

  function renderCleaning(){
    const box = document.getElementById("cleaningGrid");
    box.innerHTML = "";
    const slot = currentSlot();

    cleaningItems.forEach(name => {
      const item = document.createElement("div");
      item.className = "checkitem";

      const span = document.createElement("span");
      span.textContent = name;

      const cb = document.createElement("input");
      cb.type = "checkbox";
      cb.checked = !!slot.cleaning[name];
      cb.addEventListener("change", () => {
        slot.cleaning[name] = cb.checked;
        saveState("Pulizia aggiornata · " + state.selectedDate + " · " + (state.selectedShift === "morning" ? "Mattina" : "Sera"));
        renderHistory();
      });

      item.appendChild(span);
      item.appendChild(cb);
      box.appendChild(item);
    });
  }

  function renderEquipment(){
    const box = document.getElementById("equipmentGrid");
    box.innerHTML = "";
    const slot = currentSlot();

    equipmentItems.forEach(name => {
      const item = document.createElement("div");
      item.className = "checkitem";

      const span = document.createElement("span");
      span.textContent = name;

      const controls = document.createElement("div");

      const label1 = document.createElement("label");
      label1.style.fontSize = "12px";
      label1.style.color = "#b4ac9d";
      label1.innerHTML = 'Pulito ';
      const cb1 = document.createElement("input");
      cb1.type = "checkbox";
      cb1.checked = !!slot.equipment[name].clean;

      const label2 = document.createElement("label");
      label2.style.fontSize = "12px";
      label2.style.color = "#b4ac9d";
      label2.style.marginLeft = "8px";
      label2.innerHTML = 'OK ';
      const cb2 = document.createElement("input");
      cb2.type = "checkbox";
      cb2.checked = !!slot.equipment[name].ok;

      cb1.addEventListener("change", () => {
        slot.equipment[name].clean = cb1.checked;
        saveState("Attrezzatura aggiornata · " + state.selectedDate + " · " + (state.selectedShift === "morning" ? "Mattina" : "Sera"));
      });
      cb2.addEventListener("change", () => {
        slot.equipment[name].ok = cb2.checked;
        saveState("Attrezzatura aggiornata · " + state.selectedDate + " · " + (state.selectedShift === "morning" ? "Mattina" : "Sera"));
      });

      label1.appendChild(cb1);
      label2.appendChild(cb2);
      controls.appendChild(label1);
      controls.appendChild(label2);

      item.appendChild(span);
      item.appendChild(controls);
      box.appendChild(item);
    });
  }

  function renderNotes(){
    const ta = document.getElementById("notesInput");
    ta.value = currentSlot().notes || "";
  }

  function renderHistory(){
    const body = document.getElementById("historyBody");
    body.innerHTML = "";

    Object.keys(state.records).sort().reverse().forEach(date => {
      ["morning","evening"].forEach(shift => {
        const slot = ensureDate(date)[shift];
        const tr = document.createElement("tr");

        const tdDate = document.createElement("td");
        tdDate.textContent = date;

        const tdShift = document.createElement("td");
        tdShift.textContent = shift === "morning" ? "Mattina" : "Sera";

        const tdTime = document.createElement("td");
        tdTime.textContent = slot.time || "";

        const tdTemp = document.createElement("td");
        tdTemp.textContent = String(countTempOk(slot));

        const tdClean = document.createElement("td");
        tdClean.textContent = String(countCleaning(slot));

        const tdAction = document.createElement("td");
        const btn = document.createElement("button");
        btn.type = "button";
        btn.textContent = "Carica";
        btn.addEventListener("click", () => {
          state.selectedDate = date;
          state.selectedShift = shift;
          document.getElementById("dateInput").value = date;
          document.getElementById("shiftInput").value = shift;
          document.getElementById("timeInput").value = ensureDate(date)[shift].time || "";
          renderAll();
          setStatus("Caricato: " + date + " · " + (shift === "morning" ? "Mattina" : "Sera"));
        });
        tdAction.appendChild(btn);

        tr.appendChild(tdDate);
        tr.appendChild(tdShift);
        tr.appendChild(tdTime);
        tr.appendChild(tdTemp);
        tr.appendChild(tdClean);
        tr.appendChild(tdAction);
        body.appendChild(tr);
      });
    });
  }

  function renderAll(){
    ensureDate(state.selectedDate);
    document.getElementById("dateInput").value = state.selectedDate;
    document.getElementById("timeInput").value = currentSlot().time || state.selectedTime || "";
    document.getElementById("shiftInput").value = state.selectedShift;
    buildTemperatureRows(tempKitchen, "tempsKitchen");
    buildTemperatureRows(tempRoom, "tempsRoom");
    renderCleaning();
    renderEquipment();
    renderNotes();
    renderHistory();
  }

  function resetCurrent(){
    ensureDate(state.selectedDate)[state.selectedShift] = emptySlot();
    saveState("Turno azzerato · " + state.selectedDate + " · " + (state.selectedShift === "morning" ? "Mattina" : "Sera"));
    renderAll();
  }

  document.getElementById("todayLabel").textContent = new Date().toLocaleDateString("it-IT", {
    weekday:"long", day:"2-digit", month:"long", year:"numeric"
  });

  document.getElementById("dateInput").addEventListener("change", e => {
    state.selectedDate = e.target.value;
    ensureDate(state.selectedDate);
    renderAll();
    saveState("Data cambiata");
  });

  document.getElementById("timeInput").addEventListener("change", e => {
    state.selectedTime = e.target.value;
    currentSlot().time = e.target.value;
    saveState("Ora aggiornata · " + state.selectedDate + " · " + (state.selectedShift === "morning" ? "Mattina" : "Sera"));
    renderHistory();
  });

  document.getElementById("shiftInput").addEventListener("change", e => {
    state.selectedShift = e.target.value;
    renderAll();
    saveState("Turno cambiato");
  });

  document.getElementById("notesInput").addEventListener("input", e => {
    currentSlot().notes = e.target.value;
    saveState("Note aggiornate · " + state.selectedDate + " · " + (state.selectedShift === "morning" ? "Mattina" : "Sera"));
  });

  document.getElementById("saveBtn").addEventListener("click", () => {
    currentSlot().time = document.getElementById("timeInput").value || "";
    saveState("Turno salvato · " + state.selectedDate + " · " + (state.selectedShift === "morning" ? "Mattina" : "Sera"));
    renderHistory();
  });

  document.getElementById("resetBtn").addEventListener("click", resetCurrent);

  document.querySelectorAll(".navbtn").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".navbtn").forEach(b => b.classList.remove("active"));
      document.querySelectorAll(".section").forEach(s => s.classList.remove("active"));
      btn.classList.add("active");
      document.getElementById(btn.dataset.target).classList.add("active");
    });
  });

  document.getElementById("exportBtn").addEventListener("click", () => {
    const blob = new Blob([JSON.stringify(state, null, 2)], {type:"application/json"});
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "locoselli-haccp-backup.json";
    a.click();
    URL.revokeObjectURL(a.href);
  });

  document.getElementById("importBtn").addEventListener("click", () => {
    document.getElementById("importFile").click();
  });

  document.getElementById("importFile").addEventListener("change", e => {
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try{
        state = Object.assign(defaultState(), JSON.parse(ev.target.result));
        saveState("Backup importato");
        renderAll();
      }catch(err){
        setStatus("Backup non valido");
      }
    };
    reader.readAsText(file);
  });

  renderAll();
})();
</script>
</body>
</html>
