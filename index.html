<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Locoselli HACCP V7</title>
<meta name="theme-color" content="#111111" />
<link rel="icon" href="logo.PNG" />
<link rel="apple-touch-icon" href="logo-apple.png" />
<style>
:root{--bg:#0f1013;--panel:#17181d;--panel2:#20222a;--line:#30323b;--text:#f5f1e8;--muted:#b8b0a1;--gold:#c9a45c;--bad:#b83a3a;--ok:#1d8f4d}
*{box-sizing:border-box}
body{margin:0;padding:16px;background:linear-gradient(180deg,#0b0c0f,#14161b);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif}
.app{max-width:1200px;margin:0 auto}
.hero,.card{background:var(--panel);border:1px solid var(--line);border-radius:20px}
.hero{padding:18px}
.top{display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap;align-items:center}
.brand{display:flex;align-items:center;gap:14px}
.logo{width:58px;height:58px;border-radius:16px;overflow:hidden;border:1px solid rgba(201,164,92,.3);display:flex;align-items:center;justify-content:center;background:#111}
.logo img{width:100%;height:100%;object-fit:cover}
h1{margin:0;color:#e6c989}
h2{margin:0 0 12px 0}
.muted{color:var(--muted)}
.toolbar{display:grid;grid-template-columns:1.4fr 1fr 1fr 1fr;gap:12px;margin-top:14px}
.tile{background:var(--panel2);border:1px solid var(--line);border-radius:16px;padding:12px}
.tile h3{margin:0 0 8px 0;font-size:13px;color:var(--muted)}
input,select,button,textarea{font:inherit;border-radius:12px;border:1px solid var(--line);background:var(--panel2);color:var(--text)}
input,select,textarea{width:100%;padding:10px 12px}
button{padding:10px 14px;cursor:pointer}
.gold{background:linear-gradient(180deg,#c9a45c,#ad8540);color:#111;border:none;font-weight:700}
.layout{display:grid;grid-template-columns:300px 1fr;gap:16px;margin-top:16px}
.side,.main{background:var(--panel);border:1px solid var(--line);border-radius:20px}
.side{padding:12px}
.nav{display:block;width:100%;text-align:left;background:transparent;border:1px solid transparent;color:var(--text);padding:12px;border-radius:14px}
.nav.active{background:#1d1f26;border-color:rgba(201,164,92,.25);color:#e6c989}
.nav+.nav{margin-top:8px}
.main{padding:16px}
.section{display:none}
.section.active{display:block}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.row{display:grid;grid-template-columns:1fr 110px auto;gap:10px;align-items:center;margin:10px 0}
.chip{display:inline-block;padding:6px 10px;border-radius:999px;font-size:12px;border:1px solid var(--line)}
.ok{background:rgba(29,143,77,.16);color:#9ef0bf;border-color:rgba(29,143,77,.35)}
.bad{background:rgba(184,58,58,.16);color:#ffb1b1;border-color:rgba(184,58,58,.35)}
.check{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.checkitem{display:flex;justify-content:space-between;align-items:center;gap:10px;background:var(--panel2);border:1px solid var(--line);border-radius:14px;padding:12px}
.checkitem input{width:auto}
table{width:100%;border-collapse:collapse}
th,td{padding:10px;border-bottom:1px solid var(--line);text-align:left;font-size:14px}
.table{overflow:auto;border:1px solid var(--line);border-radius:14px;background:var(--panel2)}
.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}
.status{margin-top:12px;padding:10px 12px;border-radius:12px;background:#15161b;border:1px solid var(--line);color:#e6c989}
textarea{min-height:90px}
@media (max-width:900px){.toolbar,.layout,.grid2,.check{grid-template-columns:1fr}.row{grid-template-columns:1fr 110px}}
</style>
</head>
<body>
<div class="app">
<div class="hero">
<div class="top">
<div class="brand">
<div class="logo"><img src="logo.PNG" alt="Locoselli" onerror="this.style.display='none'; this.parentNode.textContent='L';"></div>
<div><h1>Locoselli HACCP</h1><div class="muted">Versione V7 stabile · salvataggio separato mattina / sera</div></div>
</div>
<div class="actions">
<button onclick="exportBackup()">Esporta backup</button>
<button onclick="document.getElementById('importFile').click()">Importa backup</button>
<input id="importFile" type="file" accept=".json" hidden>
<button class="gold" onclick="window.print()">Stampa / PDF</button>
</div>
</div>
<div class="toolbar">
<div class="tile"><h3>Oggi</h3><div id="todayText"></div></div>
<div class="tile"><h3>Data controllo</h3><input id="recordDate" type="date"></div>
<div class="tile"><h3>Ora controllo</h3><input id="recordTime" type="time"></div>
<div class="tile"><h3>Turno</h3><select id="recordShift"><option value="morning">Mattina</option><option value="evening">Sera</option></select></div>
</div>
<div class="status" id="saveStatus">Pronto.</div>
</div>

<div class="layout">
<div class="side">
<button class="nav active" data-target="temps">🌡️ Temperature</button>
<button class="nav" data-target="clean">🧼 Pulizie</button>
<button class="nav" data-target="equip">⚙️ Attrezzature</button>
<button class="nav" data-target="expiry">📦 Scadenze</button>
<button class="nav" data-target="notes">📝 Note</button>
<button class="nav" data-target="history">📚 Storico</button>
</div>

<div class="main">
<section class="section active" id="temps"><h2>Temperature</h2><div class="grid2"><div class="card" style="padding:14px"><h3>Cucina</h3><div id="tempsKitchen"></div></div><div class="card" style="padding:14px"><h3>Sala / Bar</h3><div id="tempsRoom"></div></div></div></section>
<section class="section" id="clean"><h2>Pulizie</h2><div class="check" id="cleanGrid"></div></section>
<section class="section" id="equip"><h2>Attrezzature</h2><div class="check" id="equipGrid"></div></section>
<section class="section" id="expiry"><h2>Scadenze</h2><div class="grid2"><input id="expName" type="text" placeholder="Nome prodotto"><div class="grid2"><input id="expOpen" type="date"><input id="expDate" type="date"></div></div><div class="actions"><button class="gold" onclick="addExpiry()">Aggiungi prodotto</button></div><div class="table" style="margin-top:12px"><table><thead><tr><th>Prodotto</th><th>Apertura</th><th>Scadenza</th><th>Stato</th><th></th></tr></thead><tbody id="expiryBody"></tbody></table></div></section>
<section class="section" id="notes"><h2>Note</h2><textarea id="notesText" placeholder="Note, problemi, azioni correttive..."></textarea></section>
<section class="section" id="history"><h2>Storico</h2><div class="table"><table><thead><tr><th>Data</th><th>Turno</th><th>Ora</th><th>Temp OK</th><th>Pulizie</th><th></th></tr></thead><tbody id="historyBody"></tbody></table></div></section>
<div class="actions"><button class="gold" onclick="saveCurrent()">Salva</button><button onclick="resetCurrent()">Azzera questo turno</button></div>
</div>
</div>
</div>
<script>
const KEY="locoselli_haccp_v7";
const TEMP_ITEMS={
kitchen:[
{key:"cellaVerdure",label:"Frigo cella verdure",min:0,max:4},
{key:"lineaPrimi",label:"Frigo linea primi",min:0,max:4},
{key:"lineaSecondi",label:"Frigo linea secondi",min:0,max:4},
{key:"frigoAntipasti",label:"Frigo antipasti",min:0,max:4},
{key:"congelatoreCucina",label:"Congelatore cucina",max:-18,freezer:true},
{key:"abbattitore",label:"Abbattitore",max:-18,freezer:true}],
room:[
{key:"frigoViniRossi",label:"Frigo vini rossi",min:12,max:18},
{key:"frigoViniBianchi",label:"Frigo vini bianchi",min:4,max:8},
{key:"congelatoreSala",label:"Congelatore sala",max:-18,freezer:true},
{key:"frigoBevande",label:"Frigo bevande",min:0,max:4},
{key:"cellaSottoBevande",label:"Cella sotto bevande",min:0,max:4}]};
const CLEAN_ITEMS=["Bagno sopra","Bagno sotto","Bagno personale","Pavimenti","Finestre","Scaffali","Tavoli","Superfici lavoro","Celle e frigo"];
const EQUIP_ITEMS=["Bollitore","Cuocipasta","Griglia","Cappa","Forno ventilato","Thermomix 1","Thermomix 2","Planetaria","Macchina caffè","Scaffali fuori"];
function emptySlot(){const temps={};[...TEMP_ITEMS.kitchen,...TEMP_ITEMS.room].forEach(i=>temps[i.key]="");const cleaning={};CLEAN_ITEMS.forEach(i=>cleaning[i]=false);const equipment={};EQUIP_ITEMS.forEach(i=>equipment[i]={clean:false,ok:false});return{time:"",temps,cleaning,equipment,expiry:[],notes:""}}
function defaultState(){const now=new Date();return{selectedDate:now.toISOString().slice(0,10),selectedTime:now.toTimeString().slice(0,5),selectedShift:"morning",records:{}}}
let state=loadState();
function loadState(){try{const raw=localStorage.getItem(KEY);if(!raw)return defaultState();return {...defaultState(),...JSON.parse(raw)}}catch(e){return defaultState()}}
function persist(msg){localStorage.setItem(KEY,JSON.stringify(state));if(msg)setStatus(msg)}
function ensureDay(date){if(!state.records[date])state.records[date]={morning:emptySlot(),evening:emptySlot()};if(!state.records[date].morning)state.records[date].morning=emptySlot();if(!state.records[date].evening)state.records[date].evening=emptySlot();return state.records[date]}
function currentSlot(){const day=ensureDay(state.selectedDate);return day[state.selectedShift]}
function setStatus(text){document.getElementById("saveStatus").textContent=text}
function classify(item,value){if(value===""||isNaN(Number(value)))return{text:"—",cls:""};const v=Number(value);if(item.freezer)return v<=item.max?{text:"OK",cls:"ok"}:{text:"Fuori range",cls:"bad"};return (v>=item.min&&v<=item.max)?{text:"OK",cls:"ok"}:{text:"Fuori range",cls:"bad"}}

function renderTemps(){
  function renderGroup(items,target){
    const box=document.getElementById(target); box.innerHTML="";
    const slot=currentSlot();
    items.forEach(item=>{
      const row=document.createElement("div");
      row.className="row";
      row.innerHTML=`<label>${item.label}</label><input type="number" step="0.1" id="${item.key}" value="${slot.temps[item.key]??""}" placeholder="°C"><span class="chip" id="${item.key}_status">—</span>`;
      box.appendChild(row);
      const input=row.querySelector("input");
      const chip=row.querySelector("span");
      const apply=()=>{
        slot.temps[item.key]=input.value;
        const c=classify(item,input.value);
        chip.textContent=c.text;
        chip.className="chip "+(c.cls||"");
        autoSave("Temperatura aggiornata");
      };
      input.addEventListener("input",apply);
      apply();
    });
  }
  renderGroup(TEMP_ITEMS.kitchen,"tempsKitchen");
  renderGroup(TEMP_ITEMS.room,"tempsRoom");
}
function renderClean(){
  const box=document.getElementById("cleanGrid"); const slot=currentSlot(); box.innerHTML="";
  CLEAN_ITEMS.forEach(name=>{
    const d=document.createElement("div");
    d.className="checkitem";
    d.innerHTML=`<span>${name}</span><input type="checkbox" ${slot.cleaning[name]?"checked":""}>`;
    const cb=d.querySelector("input");
    cb.addEventListener("change",()=>{slot.cleaning[name]=cb.checked; autoSave("Pulizia aggiornata")});
    box.appendChild(d);
  });
}
function renderEquip(){
  const box=document.getElementById("equipGrid"); const slot=currentSlot(); box.innerHTML="";
  EQUIP_ITEMS.forEach(name=>{
    const d=document.createElement("div");
    d.className="checkitem";
    d.innerHTML=`<span>${name}</span><div><label style="font-size:12px;color:#b8b0a1">Pulito <input type="checkbox" class="c1" ${slot.equipment[name].clean?"checked":""}></label><label style="font-size:12px;color:#b8b0a1;margin-left:8px">OK <input type="checkbox" class="c2" ${slot.equipment[name].ok?"checked":""}></label></div>`;
    d.querySelector(".c1").addEventListener("change",e=>{slot.equipment[name].clean=e.target.checked; autoSave("Attrezzatura aggiornata")});
    d.querySelector(".c2").addEventListener("change",e=>{slot.equipment[name].ok=e.target.checked; autoSave("Attrezzatura aggiornata")});
    box.appendChild(d);
  });
}
function renderExpiry(){
  const body=document.getElementById("expiryBody"); const slot=currentSlot(); body.innerHTML="";
  slot.expiry.forEach((item,idx)=>{
    const tr=document.createElement("tr");
    let status='<span class="chip ok">OK</span>';
    if(item.expiry){
      const diff=Math.ceil((new Date(item.expiry)-new Date(state.selectedDate))/(1000*60*60*24));
      if(diff<0) status='<span class="chip bad">Scaduto</span>';
      else if(diff<=2) status='<span class="chip">In scadenza</span>';
    }
    tr.innerHTML=`<td>${item.name}</td><td>${item.open||""}</td><td>${item.expiry||""}</td><td>${status}</td><td><button onclick="removeExpiry(${idx})">Elimina</button></td>`;
    body.appendChild(tr);
  });
}
function addExpiry(){
  const name=document.getElementById("expName").value.trim();
  const open=document.getElementById("expOpen").value;
  const expiry=document.getElementById("expDate").value;
  if(!name) return;
  currentSlot().expiry.push({name,open,expiry});
  document.getElementById("expName").value="";
  document.getElementById("expOpen").value="";
  document.getElementById("expDate").value="";
  persist("Prodotto aggiunto");
  renderExpiry(); renderHistory();
}
function removeExpiry(idx){
  currentSlot().expiry.splice(idx,1);
  persist("Prodotto eliminato");
  renderExpiry(); renderHistory();
}
function renderNotes(){document.getElementById("notesText").value=currentSlot().notes||""}
function attachNotes(){document.getElementById("notesText").addEventListener("input",e=>{currentSlot().notes=e.target.value; autoSave("Note aggiornate")})}
function countTempOk(slot){return [...TEMP_ITEMS.kitchen,...TEMP_ITEMS.room].filter(item=>classify(item,slot.temps[item.key]).cls==="ok").length}
function countCleaning(slot){return Object.values(slot.cleaning).filter(Boolean).length}
function renderHistory(){
  const body=document.getElementById("historyBody"); body.innerHTML="";
  Object.keys(state.records).sort().reverse().forEach(date=>{
    ["morning","evening"].forEach(shift=>{
      const slot=ensureDay(date)[shift];
      const tr=document.createElement("tr");
      tr.innerHTML=`<td>${date}</td><td>${shift==="morning"?"Mattina":"Sera"}</td><td>${slot.time||""}</td><td>${countTempOk(slot)}</td><td>${countCleaning(slot)}</td><td><button onclick="loadHistory('${date}','${shift}')">Carica</button></td>`;
      body.appendChild(tr);
    });
  });
}
function loadHistory(date,shift){
  state.selectedDate=date;
  state.selectedShift=shift;
  document.getElementById("recordDate").value=date;
  document.getElementById("recordShift").value=shift;
  document.getElementById("recordTime").value=ensureDay(date)[shift].time||"";
  renderAll();
  setStatus("Caricato: "+date+" · "+(shift==="morning"?"Mattina":"Sera"));
}
function autoSave(msg){
  currentSlot().time=document.getElementById("recordTime").value||state.selectedTime;
  persist(msg+" · "+state.selectedDate+" · "+(state.selectedShift==="morning"?"Mattina":"Sera"));
  renderHistory();
}
function saveCurrent(){autoSave("Salvato")}
function resetCurrent(){ensureDay(state.selectedDate)[state.selectedShift]=emptySlot(); renderAll(); persist("Turno azzerato")}
function exportBackup(){
  const blob=new Blob([JSON.stringify(state,null,2)],{type:"application/json"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob); a.download="locoselli-haccp-backup.json"; a.click(); URL.revokeObjectURL(a.href);
}
document.getElementById("importFile").addEventListener("change",e=>{
  const f=e.target.files[0]; if(!f) return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{state={...defaultState(),...JSON.parse(ev.target.result)}; persist("Backup importato"); renderAll();}
    catch(err){setStatus("Backup non valido")}
  };
  reader.readAsText(f);
});
function initTop(){
  const now=new Date();
  document.getElementById("todayText").textContent=now.toLocaleDateString("it-IT",{weekday:"long",day:"2-digit",month:"long",year:"numeric"});
  document.getElementById("recordDate").value=state.selectedDate;
  document.getElementById("recordTime").value=state.selectedTime;
  document.getElementById("recordShift").value=state.selectedShift;
  document.getElementById("recordDate").addEventListener("change",e=>{state.selectedDate=e.target.value; ensureDay(state.selectedDate); document.getElementById("recordTime").value=currentSlot().time||""; persist("Data cambiata"); renderAll();});
  document.getElementById("recordTime").addEventListener("change",e=>{state.selectedTime=e.target.value; currentSlot().time=e.target.value; persist("Ora aggiornata"); renderHistory();});
  document.getElementById("recordShift").addEventListener("change",e=>{state.selectedShift=e.target.value; document.getElementById("recordTime").value=currentSlot().time||""; persist("Turno cambiato"); renderAll();});
}
function setupNav(){
  document.querySelectorAll(".nav").forEach(btn=>{
    btn.addEventListener("click",()=>{
      document.querySelectorAll(".nav").forEach(b=>b.classList.remove("active"));
      document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
      btn.classList.add("active");
      document.getElementById(btn.dataset.target).classList.add("active");
    });
  });
}
function renderAll(){ensureDay(state.selectedDate); renderTemps(); renderClean(); renderEquip(); renderExpiry(); renderNotes(); renderHistory()}
initTop(); setupNav(); attachNotes(); ensureDay(state.selectedDate); renderAll();
</script>
</body>
</html>
